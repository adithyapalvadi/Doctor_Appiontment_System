<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - MedConnect</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .dashboard-layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 2rem;
            min-height: calc(100vh - 180px);
        }

        .sidebar {
            background: var(--bg-card);
            border-right: var(--glass-border);
            padding: 2rem 1.5rem;
            border-radius: var(--radius-md);
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .sidebar-link {
            padding: 12px 16px;
            color: var(--text-main);
            border-radius: var(--radius-sm);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sidebar-link:hover,
        .sidebar-link.active {
            background: rgba(67, 97, 238, 0.1);
            color: var(--primary);
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid rgba(100, 116, 139, 0.2);
            border-radius: var(--radius-sm);
            padding: 1.5rem;
            text-align: center;
        }

        .stat-card h2 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            color: var(--primary);
        }
    </style>
</head>

<body>
    <nav class="navbar" id="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <div class="logo-icon">+</div>
                MedConnect
            </a>
            <div class="nav-links">
                <div class="user-menu" style="display: flex;">
                    <span class="user-menu-name"></span>
                    <button onclick="window.logout()" class="btn btn-text">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="dashboard-layout glass-panel" style="padding:0; overflow:hidden;">
            <aside class="sidebar">
                <h3 style="margin-bottom: 2rem;">Admin Portal</h3>
                <div class="sidebar-menu">
                    <div class="sidebar-link active" onclick="switchTab('analytics')">Platform Analytics</div>
                </div>
            </aside>
            <div style="padding: 2rem;" id="dashboard-content">
                <h2 style="margin-bottom:1.5rem;">Platform Analytics</h2>
                <div class="grid grid-3" style="margin-bottom: 2rem;">
                    <div class="stat-card">
                        <h2 id="stat-patients">-</h2>
                        <p>Total Patients</p>
                    </div>
                    <div class="stat-card">
                        <h2 id="stat-doctors">-</h2>
                        <p>Total Doctors</p>
                    </div>
                    <div class="stat-card">
                        <h2 id="stat-appointments">-</h2>
                        <p>Total Appointments</p>
                    </div>
                </div>
                <div class="glass-panel" style="padding: 2rem; text-align: center; border-radius: var(--radius-sm);">
                    <p style="color: var(--text-muted); margin-bottom: 1rem;">Admin dashboard is in Beta mode. Full
                        management capabilities (Add/Remove Doctors, Manage Symptoms) will be available in the next
                        release.</p>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/dashboard-admin.js"></script>
</body>

</html>
