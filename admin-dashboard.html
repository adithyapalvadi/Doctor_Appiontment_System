<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - MedConnect</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <a href="index.html" class="logo">
                <div class="logo-icon">+</div>
                MedConnect
            </a>
            <div class="nav-links" style="display: flex; gap: 2rem;">
                <a href="index.html" class="nav-item">Home</a>
                <a href="symptoms.html" class="nav-item">Find Doctor</a>
                <a href="doctors.html" class="nav-item">Doctors</a>
                <a href="booking.html" class="nav-item">Book Appointment</a>
            </div>
            <div class="auth-btn-group" style="display: flex; align-items: center; gap: 1rem;">
                <span class="user-menu-name" style="font-weight: 600;"></span>
                <button onclick="window.logout()" class="btn btn-ghost btn-sm">Logout</button>
            </div>
        </div>
    </nav>

    <!-- Header Section -->
    <div class="container" style="margin-top: 3rem; margin-bottom: 2rem;">
        <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem; color: #0f172a;">Admin Dashboard</h1>
        <p style="color: var(--text-muted); font-size: 1.1rem;">Manage doctors, symptoms, and view system statistics</p>
    </div>

    <!-- Main Content Container -->
    <div class="container">
        <!-- Top Stats Row -->
        <div id="top-stats-row" class="admin-stats-grid">
            <!-- Rendered by JS -->
            <div class="stat-card-pill loading"><p>Loading stats...</p></div>
        </div>

        <!-- Charts Section -->
        <div id="charts-section" class="admin-charts-grid">
            <!-- Rendered by JS -->
        </div>

        <!-- Management Navigation -->
        <div class="mgmt-header">
            <button class="mgmt-tab active" onclick="switchMgmtTab('doctors')">
                <span>👨‍⚕️</span> Manage Doctors
            </button>
            <button class="mgmt-tab" onclick="switchMgmtTab('symptoms')">
                <span>🩺</span> Manage Symptoms
            </button>
        </div>

        <!-- Management Content -->
        <div id="mgmt-content">
            <!-- Rendered by JS -->
        </div>
    </div>

    <!-- Modals -->
    <div id="add-symptom-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 class="mb-2">Add New Symptom Mapping</h3>
            <form id="add-symptom-form">
                <div class="form-group">
                    <label class="form-label">Symptom Name</label>
                    <input type="text" id="new-symptom-name" class="form-control" placeholder="e.g. Sharp Chest Pain" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Mapped Specialty</label>
                    <select id="new-symptom-specialty" class="form-control" required>
                        <option value="" disabled selected>Select specialty</option>
                        <option>General Physician</option>
                        <option>Cardiologist</option>
                        <option>Neurologist</option>
                        <option>Dermatologist</option>
                        <option>Orthopedic Surgeon</option>
                        <option>ENT Specialist</option>
                        <option>Gastroenterologist</option>
                        <option>Pulmonologist</option>
                        <option>Psychiatrist</option>
                        <option>Endocrinologist</option>
                        <option>Gynecologist</option>
                        <option>Pediatrician</option>
                        <option>Ophthalmologist</option>
                        <option>Dentist</option>
                        <option>Urologist</option>
                        <option>Oncologist</option>
                    </select>
                </div>
                <div class="flex gap-2 justify-center mt-3">
                    <button type="submit" class="btn btn-primary">Add Mapping</button>
                    <button type="button" onclick="closeModal('add-symptom-modal')" class="btn btn-outline">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/dashboard-admin.js"></script>
</body>
</html>
