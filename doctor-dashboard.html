<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Dashboard - MedConnect</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <div class="logo-icon">+</div>
                MedConnect
            </a>
            <div class="nav-links">
                <div class="user-menu" style="display: flex;">
                    <span class="user-menu-name"></span>
                    <button onclick="window.logout()" class="btn btn-ghost btn-sm">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Dashboard Layout -->
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>Doctor Portal</h3>
            </div>
            <div class="sidebar-menu">
                <div class="sidebar-link active" onclick="switchTab('requests')">
                    <span class="sidebar-icon">📩</span> Requests
                </div>
                <div class="sidebar-link" onclick="switchTab('schedule')">
                    <span class="sidebar-icon">📅</span> My Schedule
                </div>
                <div class="sidebar-link" onclick="switchTab('history')">
                    <span class="sidebar-icon">🕒</span> History
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="dash-content" id="dashboard-content">
            <!-- Rendered by JavaScript -->
            <div class="loading-state">
                <div class="spinner"></div>
                <p>Loading dashboard...</p>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/dashboard-doctor.js"></script>
</body>
</html>
